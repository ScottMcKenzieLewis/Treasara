   <button
      type="button"
      mat-icon-button
      class="trs-info-tip"
      [attr.aria-label]="ariaLabel"
      [trsTooltip]="text"
      [trsTooltipPosition]="position"
      [trsTooltipShowDelay]="showDelay"
      [trsTooltipHideDelay]="hideDelay"
      [trsTooltipDisabled]="disabled"
      [trsTooltipClass]="trsTooltipClass">
      <mat-icon fontIcon="info"></mat-icon>
    </button>
