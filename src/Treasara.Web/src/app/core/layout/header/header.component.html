<header class="header">
  <div class="header-inner">
    <div class="brand" routerLink="/">
      <img [src]="logoPath" class="logo" alt="Treasara logo">
      <span class="brand-text">Treasara</span>
    </div>

    <nav class="nav">
      <button type="button" class="nav-link nav-menu-trigger" [matMenuTriggerFor]="bondsMenu">
        <span>Bonds</span>
        <span class="nav-caret">▾</span>
      </button>

      <mat-menu #bondsMenu="matMenu"  class="tr-menu" panelClass="tr-menu">
        <button mat-menu-item routerLink="/bonds/valuation">
          Bond Valuation
        </button>
      </mat-menu>
      <a routerLink="/about">About</a>
      <app-theme-toggle></app-theme-toggle>
    </nav>
  </div>
</header>
